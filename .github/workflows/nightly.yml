name: Nightly Results Update

on:
  schedule:
    # 12:00 UTC = 9:00 AM EST (Nov–Mar) / 8:00 AM EDT (Mar–Nov)
    # GitHub cron is fixed UTC — does NOT auto-adjust for DST.
    # 12:00 UTC is safe year-round: all NBA games (latest ~1am ET) are
    # finalized well before this fires regardless of the season.
    - cron: '0 12 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit results.json back to repo

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run results updater
        env:
          SGO_API_KEY: ${{ secrets.SGO_API_KEY }}
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: python scripts/update_results.py

      - name: Commit updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results_v3.json
          git diff --staged --quiet || git commit -m "results: $(date -u +'%Y-%m-%d')"
          git push
